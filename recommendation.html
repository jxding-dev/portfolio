<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .instructor-recommend-card {
        display: flex;
        gap: 15px;
        max-width: 700px;
        margin: 30px auto;
        padding: 20px 24px;
        background-color: #f8f9fa;
        border-left: 4px solid #4a90e2;
        border-radius: 0 8px 8px 0;
        box-sizing: border-box;
      }

      .rec-quote-mark {
        font-size: 32px;
        font-family: serif;
        color: #4a90e2;
        line-height: 1;
        opacity: 0.7;
      }

      .rec-content {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .rec-message {
        font-size: 14px;
        color: #4a5568;
        line-height: 1.6;
        margin: 0;
        font-weight: 500;
        word-break: keep-all;
      }

      .rec-author {
        font-size: 12px;
        color: #a0aec0;
        font-weight: 400;
      }
    </style>
</head>
<body>
    <div class="instructor-recommend-card">
        <div class="rec-quote-mark">“</div>
        <div class="rec-content">
            <p class="rec-message">
            학습 과정에서 마주하는 어려움에 포기하지 않고 묵묵히 자신만의 속도로 성장한 학생입니다.
            기술적인 어려움을 마주했을 때 매몰되지 않고, AI 프롬프트를 적극적으로 연구하고 활용하여 UI 디자인과 퍼블리싱을 완성해 내는 영리한 돌파력을 보여주었습니다.
            실무에서 세심함을 보완하며 경험을 쌓는다면, AI 협업 시대에 걸맞게 빠르게 몫을 해낼 성장 잠재력이 높은 인재로 적극 추천합니다.
            </p>
            <span class="rec-author">— 스마트웹&콘텐츠개발 과정 지도강사 추천</span>
        </div>
    </div>
</body>
</html>
