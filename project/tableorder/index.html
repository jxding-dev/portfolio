<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문하시겠어요? · 테이블오더</title>
    <link rel="stylesheet" as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/layout.css">
    <script src="scripts/data.js" defer></script>
    <script src="scripts/main.js" defer></script>
</head>
<body>

    <div class="header-bar">
        <div class="table-number">테이블 01</div>
        <div class="current-category" id="selected-category-name">주스 / 에이드 / 크러쉬</div>
        <div class="order-actions">
            <button id="btn-view-cart">장바구니</button>
            <button id="btn-view-order">주문내역</button>
        </div>
    </div>

    <div id="wrapper">
        <header id="header">
            <ul class="tab-main sec-tit">
                <li data-main="new"><button>신메뉴</button></li>
                <li data-main="coffee"><button>커피</button></li>
                <li data-main="nonecoffee"><button>논커피</button></li>
                <li data-main="juice"><button>주스 / 에이드 / 크러쉬</button></li>
                <li data-main="smoothie"><button>스무디 / 프라페</button></li>
                <li data-main="tea"><button>티</button></li>
                <li data-main="desert"><button>디저트</button></li>
            </ul>
        </header>

        <section id="productSec">
            <ul class="product-list"></ul>
        </section>

        <section id="optionSec">
            <div class="inbox">
                <div class="modal-header">
                    <h2 class="modal-title" id="modal-title-name">옵션 선택</h2>
                    <button class="btn-close" id="btn-close-modal">닫기</button>
                </div>
                <div class="box-top">
                    <div class="product-info"></div>
                    <div class="option-list"></div>
                </div>
                <div class="box-btm">
                    <div class="quantity">
                        <button class="minus" data-btn="minus">-</button>
                        <span class="count">1</span>
                        <button class="plus" data-btn="plus">+</button>
                    </div>
                    <p class="price">총<span class="total"></span>원 장바구니 담기</p>
                </div>
            </div>
        </section>

        <section id="cartSec" class="cart-sidebar">
            <div class="cart-header">
                <h2>장바구니</h2>
                <button class="btn-close" id="btn-close-cart">닫기</button>
            </div>
            <div class="cart-body">
                <ul id="cart-list" class="cart-list"></ul>
            </div>
            <div class="cart-footer">
                <div class="cart-total-wrap">
                    <span>총 주문금액</span>
                    <strong id="cart-total-price">0원</strong>
                </div>
                <button class="btn-order" id="btn-order">주문하기</button>
            </div>
        </section>

        <section id="orderSec">
            <div class="inbox order-modal-inbox">
                <div class="modal-header no-border">
                    <button class="btn-close" id="btn-close-order">닫기</button>
                </div>
                <div class="order-body">
                    <p class="order-msg">주문이 완료되었습니다.</p>
                    <div class="order-list-header">
                        <span>상품명</span>
                        <span>가격</span>
                    </div>
                    <ul id="order-list"></ul>
                    <div class="order-total-bar">
                        <span>총 주문금액</span>
                        <strong id="order-total-price">0원</strong>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- confirmSec: wrapper 밖에 두고 header-bar까지 포함한 전체를 덮음 -->
    <section id="confirmSec">
        <div class="confirm-box">
            <p class="confirm-msg">주문하시겠습니까?</p>
            <div class="confirm-btns">
                <button id="btn-cancel-order">취소</button>
                <button id="btn-confirm-order">확인</button>
            </div>
        </div>
    </section>

</body>
</html>
