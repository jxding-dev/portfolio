<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>잠깐만요 게임 한 판만 · 이지현</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
:root {
    --bg:    #030309;
    --side:  #07070f;
    --scr:   #050510;
    --bd:    rgba(255,255,255,.07);
    --t1:    #f1f5f9;
    --t2:    #64748b;
    --t3:    #1e293b;
    --ac:    #a855f7;
    --ac-r:  168; --ac-g: 85; --ac-b: 247;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
    font-family:'Pretendard', -apple-system, sans-serif;
    background:var(--bg); color:var(--t1);
    display:flex; flex-direction:column; overflow:hidden;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; }
a { text-decoration:none; color:inherit; }

/* ── TOP BAR ── */
.top-bar {
    flex-shrink:0; height:62px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px;
    background:rgba(3,3,9,.9);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--bd);
    position:relative; z-index:100;
}
.top-bar::after {
    content:"";
    position:absolute; bottom:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(var(--ac-r),var(--ac-g),var(--ac-b),.4), transparent);
}
.back-btn {
    display:flex; align-items:center; gap:8px;
    font-size:.85rem; font-weight:700; color:var(--t2);
    transition:color .2s;
}
.back-btn:hover { color:var(--t1); }
.back-btn:hover svg { transform:translateX(-3px); }
.back-btn svg { transition:transform .2s; }

.top-center {
    position:absolute; left:50%; transform:translateX(-50%);
    text-align:center;
}
.top-title {
    font-size:.92rem; font-weight:900; letter-spacing:5px;
    text-transform:uppercase; color:var(--t1);
    animation:glitch 9s ease-in-out infinite;
}
.top-sub { font-size:.62rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t2); margin-top:3px; }

.top-right { display:flex; align-items:center; gap:18px; }
.live-badge {
    display:flex; align-items:center; gap:6px;
    font-size:.72rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--t2);
}
.live-dot { width:7px; height:7px; border-radius:50%; background:#34d399; animation:pulse-g 2s ease-in-out infinite; }
.game-count {
    font-size:.72rem; font-weight:700; letter-spacing:1px; color:var(--t2);
    padding:4px 10px; border:1px solid var(--bd); border-radius:20px;
}

/* ── BODY ── */
.arcade-body { flex:1; display:flex; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
    width:300px; flex-shrink:0;
    background:var(--side);
    border-right:1px solid var(--bd);
    display:flex; flex-direction:column;
    overflow:hidden;
}
.sidebar-head {
    padding:20px 18px 12px;
    border-bottom:1px solid var(--bd);
    flex-shrink:0;
}
.sidebar-head-label {
    font-size:.62rem; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--t2);
    margin-bottom:6px;
}
.sidebar-head-title {
    font-size:1.1rem; font-weight:900; color:var(--t1); letter-spacing:-.5px;
}
.sidebar-stats {
    display:flex; gap:20px; margin-top:12px;
}
.s-stat { display:flex; flex-direction:column; gap:2px; }
.s-stat strong { font-size:1.3rem; font-weight:900; color:var(--t1); font-family:monospace; line-height:1; }
.s-stat span { font-size:.58rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--t2); }

.game-list {
    flex:1; overflow-y:auto; scrollbar-width:none;
    padding:10px 12px; display:flex; flex-direction:column; gap:5px;
}
.game-list::-webkit-scrollbar { display:none; }

.g-card {
    width:100%; display:flex; align-items:center; gap:12px;
    padding:13px 12px 13px 14px;
    border:1px solid transparent; border-radius:11px;
    text-align:left; position:relative; overflow:hidden;
    transition:background .2s, border-color .2s;
}
.g-card::before {
    content:""; position:absolute; left:0; top:20%; bottom:20%;
    width:3px; border-radius:0 2px 2px 0; background:var(--c);
    opacity:0; transition:opacity .2s, top .2s, bottom .2s;
}
.g-card:hover { background:rgba(255,255,255,.04); border-color:var(--bd); }
.g-card:hover::before { opacity:.7; top:12%; bottom:12%; }
.g-card.active { background:rgba(var(--ac-r),var(--ac-g),var(--ac-b),.09); border-color:rgba(var(--ac-r),var(--ac-g),var(--ac-b),.28); }
.g-card.active::before { opacity:1; top:0; bottom:0; }

.g-icon-box {
    width:42px; height:42px; flex-shrink:0;
    border-radius:10px; background:rgba(255,255,255,.04);
    border:1px solid var(--bd);
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; line-height:1;
    transition:transform .2s, background .2s;
}
.g-card:hover .g-icon-box, .g-card.active .g-icon-box {
    background:rgba(var(--ac-r),var(--ac-g),var(--ac-b),.12);
    transform:scale(1.06);
}

.g-body { flex:1; min-width:0; }
.g-name {
    display:block; font-size:.9rem; font-weight:700; color:var(--t2);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    transition:color .2s; line-height:1.3;
}
.g-card.active .g-name { color:var(--t1); }
.g-meta { display:flex; align-items:center; gap:5px; margin-top:5px; }
.g-genre {
    font-size:.58rem; font-weight:800; letter-spacing:.8px; text-transform:uppercase;
    padding:2px 7px; border-radius:6px;
    background:rgba(var(--ac-r),var(--ac-g),var(--ac-b),.12);
    color:rgba(var(--ac-r),var(--ac-g),var(--ac-b),1);
    border:1px solid rgba(var(--ac-r),var(--ac-g),var(--ac-b),.2);
    transition:background .2s;
}
.g-diff { font-size:.65rem; letter-spacing:1px; color:var(--t2); opacity:.5; }
.g-arrow {
    width:14px; height:14px; flex-shrink:0; color:var(--t2);
    opacity:0; transition:opacity .2s, transform .2s;
}
.g-card.active .g-arrow { opacity:1; color:var(--ac); }
.g-card:hover .g-arrow { opacity:.4; transform:translateX(2px); }

/* stack footer */
.sidebar-foot {
    flex-shrink:0; padding:14px 18px;
    border-top:1px solid var(--bd);
}
.foot-label { font-size:.58rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--t2); margin-bottom:8px; }
.foot-chips { display:flex; flex-wrap:wrap; gap:5px; }
.foot-chips span {
    font-size:.65rem; font-weight:600; color:var(--t2);
    padding:3px 9px; border:1px solid var(--bd); border-radius:6px;
    background:rgba(255,255,255,.02);
}

/* ── GAME SCREEN ── */
.game-screen { flex:1; background:var(--scr); display:flex; flex-direction:column; position:relative; overflow:hidden; }

.screen-bar {
    flex-shrink:0; height:48px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
    background:rgba(5,5,16,.92);
    border-bottom:1px solid var(--bd);
    position:relative; z-index:11;
}
.screen-left { display:flex; align-items:center; gap:10px; }
.screen-pip {
    width:8px; height:8px; border-radius:50%;
    background:var(--ac); box-shadow:0 0 8px var(--ac);
    transition:background .4s, box-shadow .4s;
}
.now-label { font-size:.68rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--t2); }
.now-name { font-size:.9rem; font-weight:700; color:var(--ac); transition:color .3s; }
.screen-right { display:flex; align-items:center; gap:16px; }
.screen-num { font-size:.68rem; font-weight:600; letter-spacing:1.5px; color:var(--t2); text-transform:uppercase; }

.screen-frame { flex:1; position:relative; }
#game-frame { width:100%; height:100%; border:none; display:block; background:#fff; }

/* intro */
.screen-intro {
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    background:var(--scr);
    transition:opacity .35s, visibility .35s;
}
.screen-intro.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.intro-grid {
    position:absolute; inset:0;
    background:linear-gradient(rgba(168,85,247,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(168,85,247,.04) 1px, transparent 1px);
    background-size:44px 44px;
    animation:grid-pan 20s linear infinite;
}
.intro-glow {
    position:absolute; width:400px; height:400px; border-radius:50%;
    background:radial-gradient(circle, rgba(168,85,247,.07), transparent 65%);
    filter:blur(80px); pointer-events:none;
}
.intro-icon-wrap { position:relative; width:80px; height:80px; }
.intro-ring { position:absolute; inset:-14px; border-radius:50%; border:1.5px solid rgba(168,85,247,.2); animation:spin 7s linear infinite; }
.intro-ring2 { position:absolute; inset:-26px; border-radius:50%; border:1px solid rgba(168,85,247,.1); animation:spin 12s linear infinite reverse; }
.intro-icon {
    width:80px; height:80px; border-radius:20px;
    background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.25);
    display:flex; align-items:center; justify-content:center; font-size:2.5rem;
    animation:float 4s ease-in-out infinite;
}
.intro-games {
    display:flex; gap:10px; position:relative;
}
.intro-game-dot {
    width:38px; height:38px; border-radius:10px;
    background:rgba(255,255,255,.04); border:1px solid var(--bd);
    display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; cursor:pointer;
    transition:background .2s, border-color .2s, transform .2s;
}
.intro-game-dot:hover { background:rgba(168,85,247,.12); border-color:rgba(168,85,247,.3); transform:translateY(-3px); }

.intro-title { font-size:1.3rem; font-weight:900; letter-spacing:5px; text-transform:uppercase; color:var(--t2); position:relative; }
.intro-sub { font-size:.85rem; color:var(--t2); font-weight:500; opacity:.6; position:relative; }
.insert-coin {
    font-size:.82rem; font-weight:800; letter-spacing:4px; text-transform:uppercase;
    color:var(--ac); animation:blink 1.3s step-end infinite; position:relative;
}

.screen-flash { position:absolute; inset:0; opacity:0; z-index:8; pointer-events:none; transition:opacity .08s; }
.screen-flash.on { opacity:.06; }
.corner-glow {
    position:fixed; width:360px; height:360px; border-radius:50%;
    background:radial-gradient(circle, rgba(168,85,247,.07), transparent 70%);
    bottom:-130px; left:-80px; filter:blur(60px); pointer-events:none; z-index:0;
    transition:background 1s;
}

/* ── KEYFRAMES ── */
@keyframes glitch {
    0%,88%,100% { text-shadow:none; transform:none; }
    89% { text-shadow:-2px 0 #f472b6, 2px 0 #60a5fa; transform:skewX(-3deg); }
    90% { text-shadow:2px 0 #f472b6, -2px 0 #22d3ee; transform:skewX(2deg); }
    91% { text-shadow:none; transform:none; }
    93% { text-shadow:-1px 0 #a855f7; transform:skewX(-1deg); }
    94% { text-shadow:none; transform:none; }
}
@keyframes pulse-g { 0%,100% { box-shadow:0 0 0 0 rgba(52,211,153,.5); } 50% { box-shadow:0 0 0 5px rgba(52,211,153,0); } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes blink { 0%,100% { opacity:.9; } 50% { opacity:0; } }
@keyframes grid-pan { to { background-position:44px 44px, 44px 44px; } }

/* ── RESPONSIVE ── */
@media (max-width:700px) {
    body { overflow:auto; }
    .arcade-body { flex-direction:column; }
    .sidebar { width:100%; border-right:none; border-bottom:1px solid var(--bd); }
    .sidebar-head { display:none; }
    .game-list { flex-direction:row; overflow-x:auto; overflow-y:hidden; padding:10px; height:auto; }
    .g-card { flex-direction:column; gap:5px; width:80px; flex-shrink:0; padding:10px 6px; align-items:center; text-align:center; }
    .g-card::before { top:0; bottom:auto; left:0; right:0; width:100%; height:3px; border-radius:0 0 2px 2px; }
    .g-icon-box { width:36px; height:36px; font-size:1.1rem; }
    .g-name { font-size:.65rem; white-space:normal; }
    .g-meta, .g-arrow { display:none; }
    .sidebar-foot { display:none; }
    .game-screen { min-height:60vh; }
    .top-right .game-count { display:none; }
}
    </style>
</head>
<body>

<div class="corner-glow" id="cornerGlow"></div>

<!-- TOP BAR -->
<header class="top-bar">
    <a href="../../index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        포트폴리오
    </a>
    <div class="top-center">
        <span class="top-title">JS Game Room</span>

    <div class="top-right">
        <span class="game-count">7 GAMES</span>
        <div class="live-badge"><span class="live-dot"></span>LIVE</div>

</header>

<div class="arcade-body">

    <!-- SIDEBAR -->
    <nav class="sidebar" aria-label="게임 목록">
        <div class="sidebar-head">
            <p class="sidebar-head-label">Game Library</p>
            <p class="sidebar-head-title">미니게임 플랫폼</p>
            <div class="sidebar-stats">
                <div class="s-stat"><strong>7</strong><span>Games</span></div>
                <div class="s-stat"><strong>JS</strong><span>Only</span></div>
                <div class="s-stat"><strong>0</strong><span>Libraries</span></div>
            </div>
        </div>

        <div class="game-list">
            <button class="g-card" style="--c:#fbbf24" data-src="game01.html" data-color="251,191,36" data-name="코인 운명 결정기" onclick="loadGame(this)">
                <div class="g-icon-box">🪙</div>
                <div class="g-body">
                    <span class="g-name">코인 운명 결정기</span>
                    <div class="g-meta">
                        <span class="g-genre" style="--ac-r:251;--ac-g:191;--ac-b:36">LUCK</span>

                </div>
                <svg class="g-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

            <button class="g-card" style="--c:#34d399" data-src="game02.html" data-color="52,211,153" data-name="인류 최강 가위바위보" onclick="loadGame(this)">
                <div class="g-icon-box">✌️</div>
                <div class="g-body">
                    <span class="g-name">인류 최강 가위바위보</span>
                    <div class="g-meta">
                        <span class="g-genre" style="--ac-r:52;--ac-g:211;--ac-b:153">BATTLE</span>
                        <span class="g-diff">★☆☆</span>
                    </div>
                </div>
                <svg class="g-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <button class="g-card" style="--c:#60a5fa" data-src="game03.html" data-color="96,165,250" data-name="순발력 1 to 25" onclick="loadGame(this)">
                <div class="g-icon-box">⚡</div>
                <div class="g-body">
                    <span class="g-name">순발력 1 to 25</span>
                    <div class="g-meta">
                        <span class="g-genre" style="--ac-r:96;--ac-g:165;--ac-b:250">SPEED</span>
                        <span class="g-diff">★★☆</span>
                    </div>
                </div>
                <svg class="g-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <button class="g-card" style="--c:#f472b6" data-src="game04.html" data-color="244,114,182" data-name="틀린 색을 찾아라" onclick="loadGame(this)">
                <div class="g-icon-box">👁️</div>
                <div class="g-body">
                    <span class="g-name">틀린 색을 찾아라</span>
                    <div class="g-meta">
                        <span class="g-genre" style="--ac-r:244;--ac-g:114;--ac-b:182">VISUAL</span>
                        <span class="g-diff">★★★</span>
                    </div>
                </div>
                <svg class="g-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

            <button class="g-card" style="--c:#a855f7" data-src="game05.html" data-color="168,85,247" data-name="당신의 진짜 성격은?" onclick="loadGame(this)">
                <div class="g-icon-box">🔮</div>
                <div class="g-body">
                    <span class="g-name">당신의 진짜 성격은?</span>

            <button class="g-card" style="--c:#fb923c" data-src="game06.html" data-color="251,146,60" data-name="숫자 저격수 UP&DOWN" onclick="loadGame(this)">
                <div class="g-icon-box">🎯</div>
                <div class="g-body">
                    <span class="g-name">숫자 저격수 UP&amp;DOWN</span>

                        <span class="g-genre" style="--ac-r:251;--ac-g:146;--ac-b:60">LOGIC</span>
                        <span class="g-diff">★★☆</span>

                </div>
                <svg class="g-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

            <button class="g-card" style="--c:#f87171" data-src="game07.html" data-color="248,113,113" data-name="손가락이 불타오를 때" onclick="loadGame(this)">
                <div class="g-icon-box">💥</div>

        <div class="sidebar-foot">

    <!-- GAME SCREEN -->
    <main class="game-screen">
        <div class="screen-bar">
            <div class="screen-left">
                <div class="screen-pip" id="screenPip"></div>
                <span class="now-label">NOW PLAYING</span>
                <span class="now-name" id="nowName">—</span>
            </div>
            <div class="screen-right">
                <span class="screen-num" id="screenNum">SELECT A GAME</span>
            </div>
        </div>

<script>
const flash  = document.getElementById('screenFlash');
const intro  = document.getElementById('screenIntro');
const nowName = document.getElementById('nowName');
const screenNum = document.getElementById('screenNum');
const pip    = document.getElementById('screenPip');
const glow   = document.getElementById('cornerGlow');
const frame  = document.getElementById('game-frame');
const nums   = ['01/07','02/07','03/07','04/07','05/07','06/07','07/07'];

function loadGame(btn) {
    const src  = btn.dataset.src;
    const rgb  = btn.dataset.color;
    const name = btn.dataset.name;
    const hex  = btn.style.getPropertyValue('--c');
    const idx  = [...document.querySelectorAll('.g-card')].indexOf(btn);

    document.querySelectorAll('.g-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.documentElement.style.setProperty('--ac', hex);
    document.documentElement.style.setProperty('--ac-r', rgb.split(',')[0]);
    document.documentElement.style.setProperty('--ac-g', rgb.split(',')[1]);
    document.documentElement.style.setProperty('--ac-b', rgb.split(',')[2]);

    nowName.textContent = name;
    nowName.style.color = hex;
    pip.style.background = hex;
    pip.style.boxShadow  = `0 0 8px ${hex}`;
    screenNum.textContent = nums[idx] || '';
    glow.style.background = `radial-gradient(circle, rgba(${rgb},.08), transparent 70%)`;

    flash.style.background = hex;
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 120);

    intro.classList.add('hidden');
    frame.src = src;
}

window.addEventListener('load', () => {
    const first = document.querySelector('.g-card');
    if (first) loadGame(first);
});
</script>
</body>
</html>
