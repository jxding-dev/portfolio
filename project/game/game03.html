<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1부터 25까지 — 뇌가 녹는다</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', 'Noto Sans KR', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #fff;
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 58, 237, 0.38), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(34, 211, 238, 0.24), transparent 36%),
        linear-gradient(135deg, #101429 0%, #151b3c 48%, #071022 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      display: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      height: 650px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-radius: 30px;
      background: rgba(16, 20, 41, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: -2px;
      text-align: center;
    }

    .sub-text {
      color: rgba(255, 255, 255, 0.68);
      font-size: 13px;
      line-height: 1.35;
      margin-bottom: 0;
      text-align: center;
    }

    .status-board {
      margin-bottom: 0;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .status-card {
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .status-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 4px;
    }

    .status-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .target-value {
      color: #facc15;
    }

    .combo-value {
      color: #22d3ee;
    }

    .timer-value {
      color: #fb7185;
    }

    .timer-bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    .gauge {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #8b5cf6, #22d3ee);
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.45);
      transition: width 20s linear;
    }

    .num-box {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 390px;
      max-width: 100%;
      margin: 2px auto 0;
    }

    .num-box button {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #dfe8ff);
      color: #172036;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        0 6px 0 #b8c6e7,
        0 10px 16px rgba(0, 0, 0, 0.18);
      transition:
        transform 0.14s ease,
        box-shadow 0.14s ease,
        background 0.2s ease,
        opacity 0.25s ease,
        filter 0.2s ease;
      user-select: none;
    }

    .num-box button:hover {
      transform: translateY(-3px);
      filter: brightness(1.02);
    }

    .num-box button:active {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 #b8c6e7,
        0 5px 10px rgba(0, 0, 0, 0.16);
    }

    .num-box button.correct {
      opacity: 0;
      transform: scale(0.45) rotate(8deg);
      pointer-events: none;
      box-shadow: none;
    }

    .num-box button.wrong {
      background: linear-gradient(180deg, #ff8a8a, #ff5e7a) !important;
      color: #fff;
      animation: shake 0.28s;
    }

    .num-box button.next-hint {
      outline: 3px solid rgba(250, 204, 21, 0.45);
      outline-offset: 2px;
      animation: pulse 0.9s ease infinite;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .control-btn {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      transition: 0.2s ease;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .control-btn.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.35);
    }

    .control-btn.primary:hover {
      filter: brightness(1.08);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border-radius: 30px;
      background: rgba(7, 10, 22, 0.72);
      backdrop-filter: blur(8px);
    }

    .overlay.hidden {
      display: none;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      padding: 22px 20px;
      text-align: center;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(30, 35, 68, 0.98), rgba(16, 20, 41, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
    }

    .modal-emoji {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .modal h2 {
      font-size: 24px;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .modal p {
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .result-time {
      font-size: 30px;
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .best-record {
      color: #67e8f9;
      font-size: 13px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .particle-zone {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      border-radius: 30px;
    }

    .particle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      opacity: 0.85;
      animation: pop 700ms ease forwards;
    }

    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      50% {
        transform: translateX(5px);
      }

      75% {
        transform: translateX(-4px);
      }

      100% {
        transform: translateX(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.3);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(250, 204, 21, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(250, 204, 21, 0);
      }
    }

    @keyframes pop {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 1;
      }

      100% {
        transform: translate(var(--x), var(--y)) scale(1.3);
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      .wrapper {
        height: auto;
        min-height: 650px;
        padding: 14px;
        gap: 8px;
        border-radius: 24px;
      }

      h1 {
        font-size: 26px;
      }

      .num-box {
        width: min(100%, 370px);
        gap: 8px;
      }

      .num-box button {
        border-radius: 12px;
        font-size: 20px;
      }

      .status-value {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>순발력 1 to 25</h1>
    <p class="sub-text">1부터 25까지 순서대로 빠르게 처리하세요!</p>

    <div class="status-board">
      <div class="status-grid">
        <div class="status-card">
          <div class="status-label">다음 숫자</div>
          <div class="status-value target-value" id="targetNum">1</div>
        </div>

        <div class="status-card">
          <div class="status-label">콤보</div>
          <div class="status-value combo-value" id="comboNum">0</div>
        </div>

        <div class="status-card">
          <div class="status-label">남은 시간</div>
          <div class="status-value timer-value"><span id="count">20</span>s</div>
        </div>
      </div>

      <div class="timer-bar">
        <div class="gauge" id="gauge"></div>
      </div>
    </div>

    <div class="num-box" id="numBox"></div>

    <div class="controls">
      <button class="control-btn" id="hintBtn">힌트</button>
      <button class="control-btn primary" id="restartBtn">다시 섞기</button>
    </div>

    <div class="particle-zone" id="particleZone"></div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <div class="modal-emoji">🎯</div>
        <h2>게임 시작</h2>
        <p>처음 숫자를 누르는 순간 타이머가 시작됩니다.<br>25까지 끊기지 말고 쭉 가보자구.</p>
        <button class="control-btn primary" id="startBtn">시작하기</button>
      </div>
    </div>

    <div class="overlay hidden" id="resultOverlay">
      <div class="modal">
        <div class="modal-emoji" id="resultEmoji">🎉</div>
        <h2 id="resultTitle">성공</h2>
        <div class="result-time" id="resultTime">0.00초</div>
        <div class="best-record" id="bestRecord">최고 기록: 없음</div>
        <p id="resultDesc">손이 꽤 빠르다.</p>
        <button class="control-btn primary" id="retryBtn">한 판 더!</button>
      </div>
    </div>
  </div>

  <script>
    const TOTAL_NUM = 25;
    const LIMIT_TIME = 20;
    const BEST_RECORD_KEY = "speedGame_bestRecord";

    const numBox = document.getElementById("numBox");
    const countBox = document.getElementById("count");
    const targetNumBox = document.getElementById("targetNum");
    const comboNumBox = document.getElementById("comboNum");
    const gaugeBox = document.getElementById("gauge");
    const hintBtn = document.getElementById("hintBtn");
    const restartBtn = document.getElementById("restartBtn");
    const overlay = document.getElementById("overlay");
    const resultOverlay = document.getElementById("resultOverlay");
    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");
    const particleZone = document.getElementById("particleZone");
    const resultEmoji = document.getElementById("resultEmoji");
    const resultTitle = document.getElementById("resultTitle");
    const resultTime = document.getElementById("resultTime");
    const resultDesc = document.getElementById("resultDesc");
    const bestRecord = document.getElementById("bestRecord");

    let numbers = [];
    let targetNum = 1;
    let combo = 0;
    let countNum = LIMIT_TIME;
    let timerId = null;
    let gameStarted = false;
    let gameEnded = false;
    let startTimestamp = 0;

    function makeNumbers() {
      numbers = [];

      for (let i = 1; i <= TOTAL_NUM; i++) {
        numbers.push(i);
      }

      for (let i = numbers.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        const temp = numbers[i];

        numbers[i] = numbers[randomIndex];
        numbers[randomIndex] = temp;
      }
    }

    function renderButtons() {
      let html = "";

      numbers.forEach((num) => {
        html += `<button data-num="${num}">${num}</button>`;
      });

      numBox.innerHTML = html;
    }

    function resetGame() {
      clearInterval(timerId);

      timerId = null;
      targetNum = 1;
      combo = 0;
      countNum = LIMIT_TIME;
      gameStarted = false;
      gameEnded = false;
      startTimestamp = 0;

      countBox.textContent = countNum;
      targetNumBox.textContent = targetNum;
      comboNumBox.textContent = combo;

      gaugeBox.style.transition = "none";
      gaugeBox.style.width = "100%";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          gaugeBox.style.transition = `${LIMIT_TIME}s linear`;
        });
      });

      resultOverlay.classList.add("hidden");
      overlay.classList.remove("hidden");

      makeNumbers();
      renderButtons();
      clearHint();
    }

    function startGame() {
      if (gameStarted || gameEnded) return;

      gameStarted = true;
      startTimestamp = Date.now();
      gaugeBox.style.width = "0%";

      timerId = setInterval(() => {
        countNum--;
        countBox.textContent = countNum;

        if (countNum <= 0) {
          stopGame("fail");
        }
      }, 1000);
    }

    function stopGame(type) {
      if (gameEnded) return;

      gameEnded = true;
      clearInterval(timerId);
      timerId = null;

      const elapsed = gameStarted
        ? ((Date.now() - startTimestamp) / 1000).toFixed(2)
        : LIMIT_TIME.toFixed(2);

      if (type === "success") {
        resultEmoji.textContent = "🔥";
        resultTitle.textContent = "클리어";
        resultTime.textContent = `${elapsed}초`;
        resultDesc.textContent = getSuccessComment(Number(elapsed));

        updateBestRecord(Number(elapsed));
      } else {
        resultEmoji.textContent = "⏰";
        resultTitle.textContent = "실패";
        resultTime.textContent = "TIME OVER";
        resultDesc.textContent = "아쉽다. 한 번 더 가면 돼요.";

        showBestRecord();
      }

      resultOverlay.classList.remove("hidden");
    }

    function getSuccessComment(time) {
      if (time <= 7) return "이건 거의 반응속도 괴물 수준인데.";
      if (time <= 10) return "꽤 빠르다.";
      if (time <= 14) return "좋아. 안정적으로 잘 눌렀다.";

      return "클리어는 클리어지. 다음 판에서 더 줄여봐요.";
    }

    function updateBestRecord(current) {
      const saved = localStorage.getItem(BEST_RECORD_KEY);
      const savedNumber = saved ? Number(saved) : null;

      if (!saved || current < savedNumber) {
        localStorage.setItem(BEST_RECORD_KEY, current);
        bestRecord.textContent = `최고 기록: ${current.toFixed(2)}초`;
      } else {
        bestRecord.textContent = `최고 기록: ${savedNumber.toFixed(2)}초`;
      }
    }

    function showBestRecord() {
      const saved = localStorage.getItem(BEST_RECORD_KEY);

      if (saved) {
        bestRecord.textContent = `최고 기록: ${Number(saved).toFixed(2)}초`;
      } else {
        bestRecord.textContent = "최고 기록: 아직 없음";
      }
    }

    function clearHint() {
      const prev = document.querySelector(".num-box button.next-hint");

      if (prev) {
        prev.classList.remove("next-hint");
      }
    }

    function showHint() {
      if (gameEnded) return;

      clearHint();

      const nextBtn = document.querySelector(`.num-box button[data-num="${targetNum}"]`);

      if (nextBtn) {
        nextBtn.classList.add("next-hint");

        setTimeout(() => {
          nextBtn.classList.remove("next-hint");
        }, 1000);
      }
    }

    function createParticles(x, y) {
      const colors = ["#7c3aed", "#22d3ee", "#facc15", "#fb7185", "#ffffff"];

      for (let i = 0; i < 10; i++) {
        const particle = document.createElement("span");

        particle.className = "particle";
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.setProperty("--x", `${(Math.random() - 0.5) * 120}px`);
        particle.style.setProperty("--y", `${(Math.random() - 0.5) * 120}px`);

        particleZone.appendChild(particle);

        setTimeout(() => {
          particle.remove();
        }, 700);
      }
    }

    numBox.addEventListener("click", function (e) {
      if (gameEnded) return;
      if (e.target.tagName !== "BUTTON") return;
      if (!gameStarted) startGame();

      const pickNum = Number(e.target.dataset.num);

      if (pickNum === targetNum) {
        const rect = e.target.getBoundingClientRect();
        const wrapRect = particleZone.getBoundingClientRect();

        createParticles(
          rect.left - wrapRect.left + rect.width / 2,
          rect.top - wrapRect.top + rect.height / 2
        );

        e.target.classList.add("correct");

        targetNum++;
        combo++;

        comboNumBox.textContent = combo;
        targetNumBox.textContent = targetNum <= TOTAL_NUM ? targetNum : "끝";

        clearHint();

        if (targetNum > TOTAL_NUM) {
          stopGame("success");
        }
      } else {
        e.target.classList.add("wrong");

        combo = 0;
        comboNumBox.textContent = combo;

        setTimeout(() => {
          e.target.classList.remove("wrong");
        }, 280);
      }
    });

    hintBtn.addEventListener("click", showHint);
    restartBtn.addEventListener("click", resetGame);

    startBtn.addEventListener("click", function () {
      overlay.classList.add("hidden");
    });

    retryBtn.addEventListener("click", resetGame);

    resetGame();
    showBestRecord();
  </script>
</body>
</html>
