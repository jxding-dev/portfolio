<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지갑 열릴 각 · 모바일 쇼핑몰</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
:root {
    --bg:    #06060d;
    --side:  #08080f;
    --bd:    rgba(255,255,255,.07);
    --pink:  #f472b6;
    --purple:#a855f7;
    --t1:    #f1f5f9;
    --t2:    #64748b;
    --t3:    #1e293b;
    --phone-w: 375px;
    --phone-h: 740px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
    font-family:'Pretendard', -apple-system, sans-serif;
    background:var(--bg); color:var(--t1);
    display:flex; flex-direction:column; overflow:hidden;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; }
a { text-decoration:none; color:inherit; }

/* ── TOP BAR ── */
.top-bar {
    flex-shrink:0; height:62px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 36px;
    background:rgba(6,6,13,.85);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--bd);
    position:relative; z-index:100;
}
.top-bar::after {
    content:""; position:absolute; bottom:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(244,114,182,.35), transparent);
}
.back-btn {
    display:flex; align-items:center; gap:9px;
    font-size:.85rem; font-weight:700; color:var(--t2);
    transition:color .2s;
}
.back-btn:hover { color:var(--t1); }
.back-btn:hover svg { transform:translateX(-3px); }
.back-btn svg { transition:transform .2s; }
.top-center { position:absolute; left:50%; transform:translateX(-50%); text-align:center; }
.top-title { font-size:.9rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--t1); }
.top-sub { font-size:.65rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--t2); margin-top:3px; }
.top-right { display:flex; align-items:center; gap:16px; }
.page-indicator {
    display:flex; gap:5px; align-items:center;
}
.page-indicator span {
    width:6px; height:6px; border-radius:50%;
    background:var(--t3); transition:background .3s, transform .3s;
}
.page-indicator span.on { background:var(--pink); transform:scale(1.4); }
.live-badge {
    display:flex; align-items:center; gap:6px;
    font-size:.72rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--t2);
}
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--pink); animation:pulse-pink 2s ease-in-out infinite; }

/* ── BODY ── */
.shop-body { flex:1; display:flex; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
    width:300px; flex-shrink:0;
    background:var(--side);
    border-right:1px solid var(--bd);
    display:flex; flex-direction:column;
    overflow:hidden;
}
.sidebar-head {
    padding:22px 18px 16px;
    border-bottom:1px solid var(--bd);
    flex-shrink:0;
}
.sidebar-head-label { font-size:.6rem; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:var(--t2); margin-bottom:6px; }
.sidebar-head-title { font-size:1.1rem; font-weight:900; color:var(--t1); letter-spacing:-.5px; }
.sidebar-head-desc { font-size:.76rem; color:var(--t2); margin-top:5px; line-height:1.5; }
.sidebar-badges { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.sidebar-badges span {
    font-size:.6rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    padding:3px 9px; border-radius:6px; border:1px solid var(--bd);
    color:var(--t2); background:rgba(255,255,255,.02);
}

.page-list { flex:1; overflow-y:auto; scrollbar-width:none; padding:12px; display:flex; flex-direction:column; gap:6px; }
.page-list::-webkit-scrollbar { display:none; }

.p-card {
    width:100%; display:flex; align-items:flex-start; gap:14px;
    padding:14px 12px 14px 14px;
    border:1px solid transparent; border-radius:13px;
    text-align:left; position:relative; overflow:hidden;
    transition:background .22s, border-color .22s;
}
.p-card::before {
    content:""; position:absolute; left:0; top:20%; bottom:20%;
    width:3px; border-radius:0 2px 2px 0; background:var(--pink);
    opacity:0; transition:opacity .2s, top .2s, bottom .2s;
}
.p-card:hover { background:rgba(255,255,255,.04); border-color:var(--bd); }
.p-card:hover::before { opacity:.6; }
.p-card.active { background:rgba(244,114,182,.08); border-color:rgba(244,114,182,.25); }
.p-card.active::before { opacity:1; top:0; bottom:0; }

.p-icon {
    width:44px; height:44px; flex-shrink:0; border-radius:11px;
    background:rgba(255,255,255,.04); border:1px solid var(--bd);
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; transition:background .2s, transform .2s;
}
.p-card:hover .p-icon, .p-card.active .p-icon {
    background:rgba(244,114,182,.1); transform:scale(1.05);
}

.p-body { flex:1; min-width:0; }
.p-num { font-size:.62rem; font-weight:800; font-family:monospace; color:var(--t2); letter-spacing:.5px; margin-bottom:3px; display:block; }
.p-card.active .p-num { color:var(--pink); }
.p-name { display:block; font-size:.95rem; font-weight:700; color:var(--t2); line-height:1.3; transition:color .2s; }
.p-card.active .p-name { color:var(--t1); }
.p-chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }
.p-chip {
    font-size:.58rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    padding:2px 7px; border-radius:5px;
    background:rgba(244,114,182,.08); color:rgba(244,114,182,.7);
    border:1px solid rgba(244,114,182,.15);
}

.p-arrow { width:14px; height:14px; flex-shrink:0; color:var(--t2); opacity:0; margin-top:4px; transition:opacity .2s, transform .2s; }
.p-card.active .p-arrow { opacity:1; color:var(--pink); }
.p-card:hover .p-arrow { opacity:.4; transform:translateX(2px); }

.sidebar-foot {
    flex-shrink:0; padding:14px 18px;
    border-top:1px solid var(--bd);
}
.foot-label { font-size:.6rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--t2); margin-bottom:8px; }
.foot-chips { display:flex; flex-wrap:wrap; gap:5px; }
.foot-chips span {
    font-size:.65rem; font-weight:600; color:var(--t2);
    padding:3px 9px; border:1px solid var(--bd); border-radius:6px;
    background:rgba(255,255,255,.02);
}

/* ── PHONE STAGE ── */
.phone-stage {
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
}
.phone-stage::before {
    content:""; position:absolute;
    width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(244,114,182,.09) 0%, rgba(168,85,247,.05) 45%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    filter:blur(70px); pointer-events:none; z-index:0;
    animation:glow-breathe 5s ease-in-out infinite;
}
.phone-stage::after {
    content:""; position:absolute; inset:0;
    background:
        linear-gradient(rgba(244,114,182,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,114,182,.025) 1px, transparent 1px);
    background-size:44px 44px;
    pointer-events:none; z-index:0;
}

.phone-wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:20px; }

.phone-frame {
    width:var(--phone-w); height:var(--phone-h);
    border-radius:48px;
    border:1.5px solid rgba(255,255,255,.12);
    background:#fff; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:
        0 0 0 9px rgba(255,255,255,.035),
        0 0 0 10px rgba(255,255,255,.015),
        0 44px 90px rgba(0,0,0,.7),
        0 0 70px rgba(244,114,182,.07);
    transition:box-shadow .4s;
}
.phone-frame:hover {
    box-shadow:
        0 0 0 9px rgba(255,255,255,.035),
        0 0 0 10px rgba(255,255,255,.015),
        0 54px 110px rgba(0,0,0,.75),
        0 0 90px rgba(244,114,182,.14);
}

/* status bar */
.phone-status {
    flex-shrink:0; height:44px; background:#fff;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; position:relative;
}
.phone-status::after {
    content:""; position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:11px; height:11px; border-radius:50%;
    background:#111; box-shadow:0 0 0 2px rgba(0,0,0,.07);
}
.phone-time { font-size:13px; font-weight:700; color:#111; font-family:monospace; }
.phone-icons { display:flex; align-items:center; gap:5px; }
.phone-signal { display:flex; align-items:flex-end; gap:1.5px; height:10px; }
.phone-signal span { width:2.5px; background:#111; border-radius:1px; }
.phone-signal span:nth-child(1) { height:3px; }
.phone-signal span:nth-child(2) { height:5px; }
.phone-signal span:nth-child(3) { height:7px; }
.phone-signal span:nth-child(4) { height:10px; }
.phone-wifi { width:12px; height:10px; position:relative; }
.phone-wifi::before, .phone-wifi::after { content:""; position:absolute; border-radius:50%; border:2px solid #111; }
.phone-wifi::before { inset:-1px; clip-path:polygon(0 50%, 100% 50%, 100% 100%, 0 100%); }
.phone-wifi::after { inset:3px; clip-path:polygon(0 50%, 100% 50%, 100% 100%, 0 100%); }
.phone-batt {
    width:22px; height:11px; border:1.5px solid #111; border-radius:3px; padding:2px; position:relative;
}
.phone-batt::before { content:""; display:block; width:80%; height:100%; background:#111; border-radius:1px; }
.phone-batt::after { content:""; position:absolute; right:-5px; top:50%; transform:translateY(-50%); width:3px; height:6px; background:#111; border-radius:0 2px 2px 0; }

.phone-screen { flex:1; overflow:hidden; background:#fff; }
#shop-frame { width:100%; height:100%; border:none; display:block; background:#fff; }

.phone-home { flex-shrink:0; height:28px; background:#fff; display:flex; align-items:center; justify-content:center; }
.home-bar { width:100px; height:4px; background:#111; border-radius:10px; opacity:.6; }

/* info under phone */
.phone-info { text-align:center; }
.phone-info-name { font-size:.9rem; font-weight:700; color:var(--pink); letter-spacing:.5px; }
.phone-info-chips { display:flex; justify-content:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
.phone-info-chip {
    font-size:.62rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    padding:3px 10px; border-radius:20px;
    border:1px solid var(--bd); color:var(--t2);
    background:rgba(255,255,255,.03);
    transition:border-color .2s, color .2s;
}

/* ── KEYFRAMES ── */
@keyframes pulse-pink { 0%,100% { box-shadow:0 0 0 0 rgba(244,114,182,.5); } 50% { box-shadow:0 0 0 5px rgba(244,114,182,0); } }
@keyframes glow-breathe { 0%,100% { opacity:1; transform:translate(-50%,-50%) scale(1); } 50% { opacity:.7; transform:translate(-50%,-50%) scale(1.08); } }

/* ── RESPONSIVE ── */
@media (max-width:820px) {
    body { overflow:auto; }
    .shop-body { flex-direction:column; }
    .sidebar { width:100%; border-right:none; border-bottom:1px solid var(--bd); }
    .sidebar-head { display:none; }
    .page-list { flex-direction:row; overflow-x:auto; overflow-y:hidden; padding:10px; height:auto; gap:6px; }
    .p-card { flex-direction:column; gap:5px; width:110px; flex-shrink:0; padding:11px 10px; align-items:flex-start; }
    .p-card::before { top:0; bottom:auto; left:0; right:0; width:100%; height:3px; border-radius:0 0 2px 2px; }
    .p-icon { width:36px; height:36px; font-size:1.1rem; }
    .p-chips, .p-arrow { display:none; }
    .sidebar-foot { display:none; }
    .phone-stage { padding:24px 16px 32px; }
    .top-right .page-indicator { display:none; }
    :root { --phone-w:320px; --phone-h:620px; }
}
    </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
    <a href="../../index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        포트폴리오
    </a>
    <div class="top-center">
        <span class="top-title">Mobile Shop</span>
        <span class="top-sub">20대 여성 타깃 모바일 커머스</span>
    </div>
    <div class="top-right">
        <div class="page-indicator" id="pageIndicator">
            <span class="on"></span><span></span><span></span><span></span>
        </div>
        <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    </div>
</header>

<div class="shop-body">

    <!-- SIDEBAR -->
    <nav class="sidebar" aria-label="페이지 목록">
        <div class="sidebar-head">
            <p class="sidebar-head-label">Project</p>
            <p class="sidebar-head-title">모바일 쇼핑몰</p>
            <p class="sidebar-head-desc">20대 여성 타깃 브랜드 콘셉트 · 자체 아이콘 셋 제작 · jQuery 기반 인터랙션</p>
            <div class="sidebar-badges">
                <span>UI/UX Design</span>
                <span>Responsive</span>
                <span>4 Pages</span>
            </div>
        </div>

        <div class="page-list">

            <button class="p-card" data-src="shop-main.html" data-name="메인 페이지" data-idx="0" onclick="loadPage(this)">
                <div class="p-icon">🏠</div>
                <div class="p-body">
                    <span class="p-num">00 · MAIN</span>
                    <span class="p-name">메인 페이지</span>
                    <div class="p-chips">
                        <span class="p-chip">배너 슬라이더</span>
                        <span class="p-chip">카테고리</span>
                        <span class="p-chip">베스트</span>
                    </div>
                </div>
                <svg class="p-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <button class="p-card" data-src="shop-list.html" data-name="상품 리스트" data-idx="1" onclick="loadPage(this)">
                <div class="p-icon">🛍️</div>
                <div class="p-body">
                    <span class="p-num">01 · LIST</span>
                    <span class="p-name">상품 리스트</span>
                    <div class="p-chips">
                        <span class="p-chip">필터</span>
                        <span class="p-chip">정렬</span>
                        <span class="p-chip">그리드 레이아웃</span>
                    </div>
                </div>
                <svg class="p-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <button class="p-card" data-src="shop_detail.html" data-name="상품 상세" data-idx="2" onclick="loadPage(this)">
                <div class="p-icon">👀</div>
                <div class="p-body">
                    <span class="p-num">02 · DETAIL</span>
                    <span class="p-name">상품 상세</span>
                    <div class="p-chips">
                        <span class="p-chip">옵션 선택</span>
                        <span class="p-chip">수량 조정</span>
                        <span class="p-chip">CTA</span>
                    </div>
                </div>
                <svg class="p-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <button class="p-card" data-src="shop_cart.html" data-name="장바구니" data-idx="3" onclick="loadPage(this)">
                <div class="p-icon">🛒</div>
                <div class="p-body">
                    <span class="p-num">03 · CART</span>
                    <span class="p-name">장바구니</span>
                    <div class="p-chips">
                        <span class="p-chip">수량 변경</span>
                        <span class="p-chip">금액 계산</span>
                        <span class="p-chip">주문 흐름</span>
                    </div>
                </div>
                <svg class="p-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

        </div>

        <div class="sidebar-foot">
            <p class="foot-label">Tech Stack</p>
            <div class="foot-chips">
                <span>HTML5</span><span>CSS3</span><span>jQuery</span><span>Figma</span><span>Illustrator</span>
            </div>
        </div>
    </nav>

    <!-- PHONE STAGE -->
    <main class="phone-stage">
        <div class="phone-wrap">
            <div class="phone-frame">
                <div class="phone-status">
                    <span class="phone-time" id="phoneTime">09:41</span>
                    <div class="phone-icons">
                        <div class="phone-signal"><span></span><span></span><span></span><span></span></div>
                        <div class="phone-batt"></div>
                    </div>
                </div>
                <div class="phone-screen">
                    <iframe id="shop-frame" src="about:blank" scrolling="yes" title="쇼핑몰 페이지"></iframe>
                </div>
                <div class="phone-home"><div class="home-bar"></div></div>
            </div>
            <div class="phone-info">
                <p class="phone-info-name" id="infoName">페이지를 선택하세요</p>
                <div class="phone-info-chips" id="infoChips"></div>
            </div>
        </div>
    </main>

</div>

<script>
const chipMap = {
    'shop-main.html':   ['배너 슬라이더', '카테고리', '베스트 상품'],
    'shop-list.html':   ['필터 · 정렬', '그리드 레이아웃', '위시리스트'],
    'shop_detail.html': ['옵션 선택', '수량 조정', 'CTA 버튼'],
    'shop_cart.html':   ['수량 변경', '금액 계산', '주문 진행'],
};

function loadPage(btn) {
    const src  = btn.dataset.src;
    const name = btn.dataset.name;
    const idx  = parseInt(btn.dataset.idx);

    document.querySelectorAll('.p-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('shop-frame').src = src;
    document.getElementById('infoName').textContent = name;

    const chips = chipMap[src] || [];
    document.getElementById('infoChips').innerHTML =
        chips.map(c => `<span class="phone-info-chip">${c}</span>`).join('');

    document.querySelectorAll('#pageIndicator span').forEach((s, i) => {
        s.classList.toggle('on', i === idx);
    });
}

// 실시간 시계
function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('phoneTime').textContent = `${h}:${m}`;
}
tick(); setInterval(tick, 10000);

window.addEventListener('load', () => {
    const first = document.querySelector('.p-card');
    if (first) loadPage(first);
});
</script>
</body>
</html>
